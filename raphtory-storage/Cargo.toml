[package]
name = "raphtory-storage"
version.workspace = true
documentation.workspace = true
repository.workspace = true
license.workspace = true
readme.workspace = true
homepage.workspace = true
keywords.workspace = true
authors.workspace = true
rust-version.workspace = true
edition.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
heed = "0.11.0"
itertools = "0.11.0"
parking_lot = "0.12.1"
raphtory = { path = "../raphtory", features = ["io", "arrow"]}
rayon = "1.6"
thiserror = "1.0.48"
memmap2 = "0.8.0"
arrow2 = { path = "../../arrow2", optional = true, features=["io_ipc", "io_parquet", "io_parquet_compression","compute_concatenate", "compute_sort", "compute_merge_sort"] }
core_affinity = { version = "0.8.1"}
ahash = "0.8.3"
tempfile = "3.8.0"
clap = {version="4.4.6", features = ["derive"]}
dashmap = {version = "5.5.3", features = ["rayon"]}

[dev-dependencies]
serde = { version = "1", features = ["derive","rc"] }
proptest = "1.3.1"


