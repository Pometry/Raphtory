name: Github Private Workflow Runner
on: 
    workflow_call:
        inputs:
          base:
            type: 'string'
            default: 'master'
    pull_request:
        branches:
            - master
            

jobs:
    start_runner:
        runs-on: ubuntu-latest
        steps:
          - name: Setup AWS CLI
            uses: aws-actions/configure-aws-credentials@v4
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ${{ secrets.AWS_REGION }}
          - name: Start self-hosted runner
            run: aws ec2 start-instances --instance-ids i-03296912049a2e29f 
    lanl-bench:
        runs-on: self-hosted
        needs: start_runner
        timeout-minutes: 30
        name: LANL Query Benchmark
        steps:
          - uses: actions/checkout@v3
            name: Checkout
          - name: Run Build and Benchmark for lanl
            run:  |
              export RUSTC_WRAPPER=/home/ubuntu/.cargo/bin/sccache
              cargo build --release --example lanl
              /usr/bin/time -v cargo run --release --example lanl /home/ubuntu/netflowsorted/trovares_day85/raphtory_graph_v2
    shutdown_runner:
        runs-on: ubuntu-latest
        if: always()
        needs: [start_runner, lanl-bench]
        steps:
          - name: Setup AWS CLI
            uses: aws-actions/configure-aws-credentials@v4
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ${{ secrets.AWS_REGION }}
          - name: Stop self-hosted runner
            run: aws ec2 stop-instances --instance-ids i-03296912049a2e29f 
              
