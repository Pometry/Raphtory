name: Github Private Workflow Runner
on: 
    workflow_call:
        inputs:
          base:
            type: 'string'
            default: 'master'
    pull_request:
        branches:
            - master
            

jobs:
    start_runner:
        runs-on: ubuntu-latest
        steps:
          - name: Setup AWS CLI
            uses: aws-actions/configure-aws-credentials@v4
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ${{ secrets.AWS_REGION }}
          - name: Start self-hosted runner
            run: aws ec2 start-instances --instance-ids i-03296912049a2e29f 
    jobs_to_run:
        runs-on: self-hosted
        needs: start_runner
        timeout-minutes: 20
        steps:
          - name: An Example test command here
            run: echo "HELLO WORLD"
    shutdown_runner:
        runs-on: ubuntu-latest
        if: always()
        needs: [start_runner, jobs_to_run]
        steps:
          - name: Setup AWS CLI
            uses: aws-actions/configure-aws-credentials@v4
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ${{ secrets.AWS_REGION }}
          - name: Stop self-hosted runner
            run: aws ec2 stop-instances --instance-ids i-03296912049a2e29f 
              
