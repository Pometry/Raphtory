name: Github Private Workflow Runner
on: 
    workflow_call:
        inputs:
          base:
            type: 'string'
            default: 'master'
    
jobs:
    start-runner:
        name: Start EC2 Machine
        runs-on: ubuntu-latest
        outputs:
            label: ${{ steps.start-ec2-runner.outputs.label }}
            ec2-instance-id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}
        steps:
            - name: Configure AWS Creds
              uses: aws-actions/configure-aws-credentials@v1
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ secrets.AWS_REGION }}
            - name: Start EC2 Machine
              id: start-ec2-runner
              uses: machulav/ec2-github-runner@v2
              with:
                mode: start
                github-token: ${{ secrets.POMETRY_REPO_ACCESS_PERSONAL_TOKEN_HAAROON }}
                ec2-image-id: github-runner-image
                ec2-instance-type: t2.xlarge
                subnet-id: subnet-01cae5c4a47ac3526
                security-group-id: sg-02364bd9912125fa4
    do-the-job:
        name: Do the job on the runner
        needs: start-runner # required to start the main job when the runner is ready
        runs-on: ${{ needs.start-runner.outputs.label }} # run the job on the newly created runner
        steps:
            - name: Hello World
              run: echo 'Hello World!'
    stop-runner:
        name: Stop self-hosted EC2 runner
        needs:
            - start-runner # required to get output from the start-runner job
            - do-the-job # required to wait when the main job is done
        runs-on: ubuntu-latest
        if: ${{ always() }}
        steps:
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v1
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ secrets.AWS_REGION }}
            - name: Stop EC2 runner
              uses: machulav/ec2-github-runner@v2
              with:
                mode: stop
                github-token: ${{ secrets.POMETRY_REPO_ACCESS_PERSONAL_TOKEN_HAAROON }}
                label: ${{ needs.start-runner.outputs.label }}
                ec2-instance-id: ${{ needs.start-runner.outputs.ec2-instance-id }}